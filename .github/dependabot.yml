version: 2
updates:
  # JavaScript/TypeScript dependencies (npm).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk updates into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions (CodeQL, etc.) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
